<!DOCTYPE html>
<html>
<head>
    <title>The Brain Bot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="static/style.css">
</head>
<body>
    <div class="app-wrapper">

        <!-- Left mascot: The Brain -->
        <div class="mascot mascot-left">
            <img src="static/thebrain-t.png" alt="The Brain">
        </div>

        <!-- Main chat panel -->
        <div class="chat-panel">
            <div class="chat-header">
                <h1>The Brain Bot</h1>
                <p class="tagline">"Pinky, are you pondering what I'm pondering?"</p>
                Ask your questions about Animal Life and Intelligence OR Quantum Computing
            </div>

            <div id="chat-container" class="chat-container"></div>

            <!-- Loading indicator -->
            <div id="loading" class="loading-indicator" style="display:none;">
                <span>The Brain is thinking</span>
                <span class="dots">...</span>
            </div>

            <!-- Input controls: mode dropdown selects which Flask endpoint main.js will call.
     Values ("answer", "kbanswer", "search") must match the case labels in main.js sendMessage(). -->
            <div class="input-row">
                <select class="form-control mode-select" id="function-select">
                    <option value="answer">Answer as Chatbot</option>
                    <option value="kbanswer">Answer from Knowledge Base</option>
                    <option value="search">Search Knowledge Base</option>
                </select>
                <div class="input-group">
                    <input type="text" id="message-input" class="form-control" placeholder="Ask The Brain...">
                    <div class="input-group-append">
                        <button id="send-btn" class="btn btn-primary">Send</button>
                        <button id="clear-btn" class="btn btn-secondary">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right mascot: Pinky -->
        <div class="mascot mascot-right">
            <img src="static/pinky-t.png" alt="Pinky">
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
    <script src="static/main.js"></script>
</body>
</html>
